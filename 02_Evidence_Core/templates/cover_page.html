<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <link rel="stylesheet" href="layout_style.css">
</head>
<body>

    <div class="cover-page">
        <div class="cover-header">
            <div class="cover-title">{{title}}</div>
            <div class="cover-subtitle">{{subtitle}}</div>
        </div>
        
        <div class="cover-footer">
            <div class="metadata-grid">
                <div class="metadata-block">
                    <span class="metadata-label">Principal Compiler</span>
                    <span class="metadata-value">{{author}}</span>
                </div>
                <div class="metadata-block">
                    <span class="metadata-label">Professional Designations</span>
                    <span class="metadata-value">{{designation}}</span>
                </div>
                <div class="metadata-block">
                    <span class="metadata-label">Date of Compilation</span>
                    <span class="metadata-value">{{date}}</span>
                </div>
                <div class="metadata-block">
                    <span class="metadata-label">Framework Architecture</span>
                    <span class="metadata-value">Forensic Governance & Compliance Standard</span>
                </div>
            </div>
        </div>
    </div>

    <div class="narrative-section">
        {{content}}
    </div>

</body>
</html>
