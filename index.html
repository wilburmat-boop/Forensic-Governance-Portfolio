<script id="annexure-linkify-script">
(function() {
  // Function to turn annexure codes into clickable links
  function linkifyAnnexures(root) {
    if (!root) root = document;
    const keys = Object.keys(ANNEXURE_MAP);
    // Create regex pattern that matches any key as a whole word, optionally preceded by "Annexure"
    const pattern = new RegExp('(?:Annexure\s+)?(' + keys.map(k => k.replace(/[.*+?^${}()|[\]\]/g, '\$&')).join('|') + ')', 'gi');
    
    function walk(node) {
      if (node.nodeType === Node.TEXT_NODE && node.parentNode) {
        // Skip if already inside a link or our own span
        if (node.parentNode.tagName === 'A' || node.parentNode.classList.contains('annexure-link')) return;
        const text = node.textContent;
        if (!text) return;
        const matches = [...text.matchAll(pattern)];
        if (matches.length === 0) return;
        
        const frag = document.createDocumentFragment();
        let lastIndex = 0;
        matches.forEach(match => {
          const code = match[1];
          // Add text before match
          if (match.index > lastIndex) {
            frag.appendChild(document.createTextNode(text.substring(lastIndex, match.index)));
          }
          // Create clickable span
          const span = document.createElement('span');
          span.className = 'annexure-link';
          span.textContent = match[0]; // full matched string "Annexure C-1" or just "C-1"
          span.title = 'Open evidence: ' + code;
          span.style.cssText = 'color:#c9933a;cursor:pointer;text-decoration:underline;font-weight:600;';
          span.addEventListener('click', function(e) {
            e.stopPropagation();
            const filePath = ANNEXURE_MAP[code];
            if (filePath && typeof showEvidenceModal === 'function') {
              showEvidenceModal(filePath);
            }
          });
          frag.appendChild(span);
          lastIndex = match.index + match[0].length;
        });
        if (lastIndex < text.length) {
          frag.appendChild(document.createTextNode(text.substring(lastIndex)));
        }
        node.parentNode.replaceChild(frag, node);
      } else if (node.nodeType === Node.ELEMENT_NODE && !['SCRIPT','STYLE','NOSCRIPT'].includes(node.tagName)) {
        // Avoid scanning elements we've already processed
        if (node.classList.contains('annexure-link')) return;
        node.childNodes.forEach(walk);
      }
    }
    walk(root);
  }
  
  // Run on page load
  document.addEventListener('DOMContentLoaded', () => linkifyAnnexures(document));
  // Also run when panels are switched (since content may be inside hidden panels)
  const origShowPanel = window.showPanel;
  if (typeof origShowPanel === 'function') {
    window.showPanel = function(id, e) {
      origShowPanel(id, e);
      setTimeout(() => linkifyAnnexures(document.getElementById(id)), 100);
    };
  }
})();
</script>


<script>
function showEvidenceModal(filePath) {
  // Remove any existing modal
  const existing = document.getElementById('evidence-modal');
  if (existing) existing.remove();
  
  const fileUrl = '/' + filePath.split('/').map(p => encodeURIComponent(p)).join('/');
  const filename = filePath.split('/').pop();
  const ext = filename.split('.').pop().toLowerCase();
  
  const modal = document.createElement('div');
  modal.id = 'evidence-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
  
  // Close button
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ Close';
  closeBtn.style.cssText = 'background:none;border:1px solid #374151;color:#9ca3af;padding:4px 12px;border-radius:4px;cursor:pointer;font-family:monospace;font-size:0.8rem;position:absolute;top:12px;right:16px;z-index:10;';
  closeBtn.onclick = () => modal.remove();
  modal.appendChild(closeBtn);
  
  // Content area
  const content = document.createElement('div');
  content.style.cssText = 'max-width:90vw;max-height:80vh;overflow:auto;background:#0d1f3c;border:1px solid #c9933a;border-radius:6px;padding:16px;text-align:center;';
  
  // AUDIO
  if (['mp3','wav','ogg','m4a','aac','flac'].includes(ext)) {
    const audio = document.createElement('audio');
    audio.controls = true;
    audio.style.cssText = 'width:100%;max-width:600px;';
    const source = document.createElement('source');
    source.src = fileUrl;
    source.type = 'audio/' + (ext === 'm4a' ? 'mp4' : ext);
    audio.appendChild(source);
    content.appendChild(audio);
    content.innerHTML += '<p style="color:#c9933a;font-family:monospace;font-size:0.85rem;margin-top:12px;">🎙️ ' + filename + '</p>';
  }
  // VIDEO
  else if (['mp4','webm','mov','avi'].includes(ext)) {
    const video = document.createElement('video');
    video.controls = true;
    video.style.cssText = 'width:100%;max-width:800px;max-height:70vh;';
    const source = document.createElement('source');
    source.src = fileUrl;
    source.type = 'video/' + (ext === 'mov' ? 'mp4' : ext);
    video.appendChild(source);
    content.appendChild(video);
    content.innerHTML += '<p style="color:#c9933a;font-family:monospace;font-size:0.85rem;margin-top:12px;">🎬 ' + filename + '</p>';
  }
  // IMAGES
  else if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) {
    const img = document.createElement('img');
    img.src = fileUrl;
    img.style.cssText = 'max-width:100%;max-height:70vh;border:1px solid #1f2937;border-radius:6px;';
    content.appendChild(img);
  }
  // PDF
  else if (ext === 'pdf') {
    const iframe = document.createElement('iframe');
    iframe.src = fileUrl;
    iframe.style.cssText = 'width:100%;height:600px;border:1px solid #1f2937;border-radius:6px;background:white;';
    content.appendChild(iframe);
  }
  // OTHER (download link)
  else {
    const link = document.createElement('a');
    link.href = fileUrl;
    link.target = '_blank';
    link.textContent = '↗ Open ' + filename;
    link.style.cssText = 'background:#1e3a5f;border:1px solid #2563eb;color:#93c5fd;padding:10px 20px;border-radius:6px;text-decoration:none;font-family:monospace;font-size:0.85rem;display:inline-block;';
    content.appendChild(link);
  }
  
  // External link
  const extLink = document.createElement('div');
  extLink.style.cssText = 'margin-top:12px;';
  extLink.innerHTML = '<a href="' + fileUrl + '" target="_blank" style="color:#3b82f6;font-family:monospace;font-size:0.8rem;">↗ Open in new tab</a>';
  content.appendChild(extLink);
  
  modal.appendChild(content);
  document.body.appendChild(modal);
  
  // Close on background click
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.remove();
  });
}
</script>
