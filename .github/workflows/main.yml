name: EthicHawks Build Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libffi-dev libxml2-dev libxslt1-dev
       - name: Install Python Dependencies
        run: |
          pip install weasyprint
      - name: Run Build
        run: python src/run_submission.py
